spring.application.name=wealth-tracker-app
# ================================================================
#  application.properties
#  Replace DB credentials with your actual PostgreSQL values.
#  Create the database manually first:
#    CREATE DATABASE wealth_tracker_db;
# ================================================================

# Server
server.port=${PORT:5000}

# Database
spring.datasource.url=jdbc:postgresql://${RDS_ENDPOINT}:5432/${DATABASE_NAME}
spring.datasource.username=${AWS_DB_USERNAME}
spring.datasource.password=${AWS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# use 'create' on very first run to generate tables, then switch to 'update'
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
# Must be at least 32 characters. Change this in production.
jwt.secret=${JWT_SECRET}
jwt.expiry=86400000